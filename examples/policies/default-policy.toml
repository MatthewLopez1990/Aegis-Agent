[defaults]
read_only = true
raw_secret_exposure = "deny"
destructive_action = "require_approval"
message_send = "require_approval"
unknown_shell_command = "deny"
unapproved_network_egress = "require_approval"
skill_without_valid_manifest = "deny"
connector_write_without_scope = "deny"
high_risk_memory_without_confirmation = "deny"

[network]
allowlist = ["example.com", "localhost", "127.0.0.1"]

[shell]
allowlist = ["pwd", "ls", "find", "python", "python3"]
